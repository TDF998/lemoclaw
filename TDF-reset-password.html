<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4F46E5; --bg: #f1f5f9; --card-bg: #fff; --text: #1e293b;
            --text-secondary: #64748b; --border: #e2e8f0; --error: #EF4444;
            --radius: 12px; --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .card {
            background: var(--card-bg); border-radius:16px; box-shadow: var(--shadow-lg);
            width:100%; max-width:420px; padding:40px 36px 36px; text-align:center;
        }
        .card .icon-circle {
            width:52px; height:52px; border-radius:50%; background:#EEF2FF;
            display:inline-flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:16px;
        }
        .card h1 { font-size:22px; font-weight:700; color:var(--text); margin-bottom:8px; }
        .card p { font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.5; }
        .form-group { margin-bottom:18px; text-align:left; }
        .form-group label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
        .form-group input {
            width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
            font-size:14px; background:#fafbfc; outline:none; transition:var(--transition);
        }
        .form-group input:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(79,70,229,0.08); }
        .btn {
            width:100%; padding:12px 20px; border:none; border-radius:10px;
            font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition);
        }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:#4338CA; transform:translateY(-1px); }
        .btn-primary:disabled { background:#a5b4fc; cursor:not-allowed; }
        .error-msg {
            background:#FEF2F2; border-radius:10px; padding:16px; color:#DC2626;
            font-size:14px; margin-bottom:20px; line-height:1.5;
        }
        .success-msg {
            background:#ECFDF5; border-radius:10px; padding:16px; color:#059669;
            font-size:14px; margin-bottom:20px;
        }
        .card-footer { margin-top:16px; font-size:14px; color:var(--text-secondary); }
        .card-footer a { color:var(--primary); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <div class="icon-circle">🔑</div>
        <h1>重置密码</h1>
        <p id="statusMessage">正在验证重置链接...</p>
        <div id="errorContainer"></div>
        <form id="resetForm" style="display:none;">
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" placeholder="至少6位" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">重置密码</button>
        </form>
        <div class="card-footer">
            <a href="login.html">← 返回登录</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zsyswamtmhqitsqbolut.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lkwHgCi9HYVKgHxVTw_7UQ_U5PRng_W';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const statusEl = document.getElementById('statusMessage');
        const errorContainer = document.getElementById('errorContainer');
        const resetForm = document.getElementById('resetForm');
        const newPasswordEl = document.getElementById('newPassword');
        const confirmPasswordEl = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');

        // 显示错误信息
        function showError(message) {
            statusEl.style.display = 'none';
            errorContainer.innerHTML = `<div class="error-msg">${message}</div>`;
            resetForm.style.display = 'none';
        }

        // 显示成功信息
        function showSuccess(message) {
            statusEl.style.display = 'none';
            errorContainer.innerHTML = `<div class="success-msg">${message}</div>`;
            resetForm.style.display = 'none';
            document.querySelector('.card-footer').style.display = 'none';
        }

        // 初始化：检查会话是否由重置密码链接创建
        (async function init() {
            try {
                // 等待 Supabase 自动从 URL 中提取 access_token 并设置会话
                // 如果用户直接访问页面没有 token，则 getSession 会返回 null
                const { data: { session }, error } = await supabaseClient.auth.getSession();

                if (error) throw error;

                if (!session) {
                    // 没有有效会话，说明链接无效或已过期
                    showError('重置密码链接无效或已过期。<br>请重新申请密码重置。');
                    return;
                }

                // 检查当前用户是否存在（安全起见）
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    showError('无法获取用户信息，请重新申请重置。');
                    return;
                }

                // 会话有效，显示重置表单
                statusEl.textContent = '请设置您的新密码';
                resetForm.style.display = 'block';

            } catch (err) {
                console.error('初始化错误:', err);
                showError('发生未知错误，请重试。');
            }
        })();

        // 提交新密码
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = newPasswordEl.value;
            const confirm = confirmPasswordEl.value;

            if (password.length < 6) {
                alert('密码至少需要6位');
                return;
            }
            if (password !== confirm) {
                alert('两次密码输入不一致');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '更新中...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password });
                if (error) {
                    throw error;
                }

                // 密码更新成功
                showSuccess('密码重置成功！即将跳转到登录页...');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                console.error('更新密码失败:', err);
                alert('密码重置失败：' + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '重置密码';
            }
        });
    </script>
</body>
</html>
