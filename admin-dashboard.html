<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 用户审核</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.3.0/css/all.min.css">
    <script src="supabase_backup.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --primary-dark: #3730A3;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 100;
        }

        .navbar .brand {
            font-weight: 700;
            font-size: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar .brand i {
            font-size: 28px;
            color: var(--primary);
        }

        .navbar .brand span {
            font-weight: 900;
            color: var(--primary);
            font-size: 20px;
            margin-left: 4px;
        }

        .navbar .admin-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .navbar .admin-info .admin-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .navbar .admin-info .admin-name i {
            font-size: 28px;
            color: var(--primary);
        }

        .btn-logout {
            padding: 6px 18px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            color: var(--text-secondary);
        }

        .btn-logout:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #DC2626;
        }

        /* ===== 主布局 ===== */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            padding: 20px 32px 32px 32px;
            display: flex;
            flex-direction: column;
        }

        /* ===== 统计卡片 ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            flex-shrink: 0;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: default;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }

        .stat-card .stat-icon {
            float: right;
            font-size: 28px;
            opacity: 0.6;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 7px 18px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .tab:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .tab .badge-count {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
            border-radius: 10px;
            padding: 0 8px;
            font-size: 11px;
            margin-left: 4px;
        }

        .tab.active .badge-count {
            background: rgba(255, 255, 255, 0.25);
        }

        .search-box {
            padding: 8px 16px 8px 36px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            min-width: 220px;
            background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>') no-repeat 12px center;
            transition: all 0.25s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
            background-color: #fff;
        }

        .search-box::placeholder {
            color: #94a3b8;
        }

        /* ===== 表格容器 ===== */
        .table-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .table-scroll {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .table-scroll table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .table-scroll thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table-scroll th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid var(--border);
            background: #f8fafc;
            white-space: nowrap;
        }

        .table-scroll td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .table-scroll tbody tr {
            transition: background 0.15s ease;
        }

        .table-scroll tbody tr:hover {
            background: #f8fafc;
        }

        .table-scroll tbody tr:last-child td {
            border-bottom: none;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            gap: 12px;
        }

        .empty-state i {
            font-size: 68px;
            opacity: 0.4;
            color: var(--text-secondary);
        }

        .empty-state .empty-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        .empty-state .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ===== 标签 ===== */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pending {
            background: #FFF7ED;
            color: #C2410C;
        }

        .badge-approved {
            background: #ECFDF5;
            color: #059669;
        }

        .badge-rejected {
            background: #FEF2F2;
            color: #DC2626;
        }

        .badge-disabled {
            background: #F1F5F9;
            color: #64748B;
        }

        /* ===== 操作按钮 ===== */
        .action-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-btns button {
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-approve {
            color: #059669;
            border-color: #A7F3D0;
        }
        .btn-approve:hover {
            background: #ECFDF5;
        }

        .btn-reject {
            color: #DC2626;
            border-color: #FECACA;
        }
        .btn-reject:hover {
            background: #FEF2F2;
        }

        .btn-disable {
            color: #64748B;
        }
        .btn-disable:hover {
            background: #F1F5F9;
        }

        .btn-enable {
            color: #4F46E5;
            border-color: #C7D2FE;
        }
        .btn-enable:hover {
            background: #EEF2FF;
        }

        .btn-delete {
            color: #EF4444;
            border-color: #FECACA;
        }
        .btn-delete:hover {
            background: #FEF2F2;
        }

        /* ===== 加载状态 ===== */
        .loading-text {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            gap: 10px;
        }

        .loading-text::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2.5px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 错误面板 ===== */
        .error-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FEF2F2;
            border-radius: var(--radius);
            padding: 40px;
            color: #DC2626;
            text-align: center;
            gap: 12px;
        }

        .error-panel h2 {
            font-size: 20px;
        }

        .error-panel p {
            font-size: 14px;
            color: #991b1b;
            max-width: 500px;
        }

        .error-panel .retry-btn {
            padding: 8px 28px;
            background: #DC2626;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .error-panel .retry-btn:hover {
            background: #B91C1C;
        }

        /* ===== 模态框 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 28px 32px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-content h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .modal-content .modal-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .modal-content textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .modal-content textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 14px;
        }

        .modal-actions .btn-cancel {
            padding: 8px 20px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .modal-actions .btn-cancel:hover {
            background: #f1f5f9;
        }

        .modal-actions .btn-confirm {
            padding: 8px 24px;
            background: #DC2626;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .modal-actions .btn-confirm:hover {
            background: #B91C1C;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                height: 56px;
            }
            .navbar .brand {
                font-size: 16px;
            }
            .navbar .brand span {
                display: none;
            }
            .main-content {
                padding: 12px 14px 20px 14px;
            }
            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .stat-card {
                padding: 12px 14px;
            }
            .stat-card .number {
                font-size: 24px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
            }
            .tab {
                white-space: nowrap;
                font-size: 12px;
                padding: 5px 14px;
            }
            .search-box {
                min-width: unset;
                width: 100%;
            }
            .table-scroll {
                font-size: 13px;
            }
            .table-scroll th,
            .table-scroll td {
                padding: 8px 10px;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .navbar .admin-info .admin-name span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 导航栏 ===== -->
    <nav class="navbar">
        <div class="brand">
            <i class="fa-brands fa-earlybirds"></i>
            TDFCHAT
            <span>管理后台</span>
        </div>
        <div class="admin-info">
            <div class="admin-name" id="adminName">
                <i class="fa-brands fa-grav"></i>
                <span>加载中...</span>
            </div>
            <button class="btn-logout" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> 退出
            </button>
        </div>
    </nav>

    <!-- ===== 主内容 ===== -->
    <div class="app-wrapper">
        <div class="main-content">
            <!-- 统计卡片 -->
            <div class="stats" id="statsContainer"></div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="tabs">
                    <div class="tab active" data-status="pending">
                        <i class="fa-regular fa-clock"></i> 待审核
                        <span class="badge-count" id="count-pending">0</span>
                    </div>
                    <div class="tab" data-status="approved">
                        <i class="fa-regular fa-circle-check"></i> 已通过
                        <span class="badge-count" id="count-approved">0</span>
                    </div>
                    <div class="tab" data-status="rejected">
                        <i class="fa-regular fa-circle-xmark"></i> 已拒绝
                        <span class="badge-count" id="count-rejected">0</span>
                    </div>
                    <div class="tab" data-status="disabled">
                        <i class="fa-regular fa-circle-pause"></i> 已禁用
                        <span class="badge-count" id="count-disabled">0</span>
                    </div>
                </div>
                <input type="text" id="searchInput" placeholder="搜索用户名或邮箱..." class="search-box">
            </div>

            <!-- 表格 -->
            <div class="table-container" id="tableContainer">
                <div class="loading-text">加载用户数据中...</div>
            </div>
        </div>
    </div>

    <!-- ===== 拒绝模态框 ===== -->
    <div class="modal" id="rejectModal">
        <div class="modal-content">
            <h3><i class="fa-regular fa-circle-xmark" style="color:#DC2626;"></i> 拒绝用户</h3>
            <p class="modal-sub">请输入拒绝原因（可选，用户将看到此原因）</p>
            <textarea id="rejectReason" placeholder="请输入拒绝原因..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelRejectBtn">取消</button>
                <button class="btn-confirm" id="confirmRejectBtn">确认拒绝</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 Supabase ====================
        const SUPABASE_URL = 'https://zsyswamtmhqitsqbolut.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lkwHgCi9HYVKgHxVTw_7UQ_U5PRng_W';
        const supabaseAuth = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentStatus = 'pending';
        let allProfiles = [];

        // ==================== 初始化 ====================
        (async function init() {
            console.log('管理后台初始化...');
            const { data: { user } } = await supabaseAuth.auth.getUser();
            if (!user) {
                console.warn('未登录，跳转登录页');
                window.location.href = 'admin-login.html';
                return;
            }
            const { data: profile, error } = await supabaseAuth
                .from('profiles')
                .select('role,nickname')
                .eq('id', user.id)
                .single();
            if (error || !profile || profile.role !== 'admin') {
                console.warn('非管理员');
                await supabaseAuth.auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            document.getElementById('adminName').innerHTML = `
                <i class="fa-brands fa-grav"></i>
                <span>${profile.nickname || user.email}</span>
            `;
            await loadData();
        })();

        // ==================== 退出 ====================
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseAuth.auth.signOut();
            window.location.href = 'admin-login.html';
        });

        // ==================== 标签切换 ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                renderTable();
            });
        });

        // ==================== 搜索 ====================
        document.getElementById('searchInput').addEventListener('input', renderTable);

        // ==================== 加载数据 ====================
        async function loadData() {
            const tableContainer = document.getElementById('tableContainer');
            tableContainer.innerHTML = '<div class="loading-text">加载用户数据中...</div>';
            try {
                const { data: { session } } = await supabaseAuth.auth.getSession();
                if (!session) throw new Error('未登录');
                const response = await fetch('https://zsyswamtmhqitsqbolut.supabase.co/functions/v1/admin-get-users', {
                    headers: { 'Authorization': `Bearer ${session.access_token}` }
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }
                const data = await response.json();
                if (!data || data.length === 0) {
                    tableContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-baseball"></i>
                            <div class="empty-title">暂无用户数据</div>
                            <div class="empty-desc">系统还没有注册用户</div>
                        </div>
                    `;
                    updateStats([]);
                    return;
                }
                allProfiles = data;
                updateStats(data);
                renderTable();
            } catch (error) {
                console.error('加载用户列表失败：', error);
                tableContainer.innerHTML = `
                    <div class="error-panel">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:36px;"></i>
                        <h2>数据加载失败</h2>
                        <p>${error.message}</p>
                        <button class="retry-btn" onclick="location.reload()">
                            <i class="fa-solid fa-rotate"></i> 重试
                        </button>
                    </div>
                `;
            }
        }

        // ==================== 更新统计 ====================
        function updateStats(profiles) {
            const pending = profiles.filter(u => u.status === 'pending').length;
            const approved = profiles.filter(u => u.status === 'approved').length;
            const rejected = profiles.filter(u => u.status === 'rejected').length;
            const disabled = profiles.filter(u => u.status === 'disabled').length;
            const total = profiles.length;

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon" style="color: #4F46E5;"><i class="fa-regular fa-user"></i></div>
                    <div class="number" style="color: #4F46E5;">${total}</div>
                    <div class="label">总用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="color:#ff6600;"><i class="fa-regular fa-clock"></i></div>
                    <div class="number" style="color:#ff6600;">${pending}</div>
                    <div class="label">待审核</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="color:#059669;"><i class="fa-regular fa-circle-check"></i></div>
                    <div class="number" style="color:#059669;">${approved}</div>
                    <div class="label">已通过</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="color:#DC2626;"><i class="fa-regular fa-circle-xmark"></i></div>
                    <div class="number" style="color:#DC2626;">${rejected}</div>
                    <div class="label">已拒绝</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon style="color:#64748B;""><i class="fa-regular fa-circle-pause"></i></div>
                    <div class="number" style="color:#64748B;">${disabled}</div>
                    <div class="label">已禁用</div>
                </div>
            `;

            // 更新标签上的计数
            document.getElementById('count-pending').textContent = pending;
            document.getElementById('count-approved').textContent = approved;
            document.getElementById('count-rejected').textContent = rejected;
            document.getElementById('count-disabled').textContent = disabled;
        }

        // ==================== 渲染表格 ====================
        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allProfiles.filter(u => u.status === currentStatus);
            if (search) {
                filtered = filtered.filter(u =>
                    (u.username?.toLowerCase() || '').includes(search) ||
                    (u.email?.toLowerCase() || '').includes(search)
                );
            }

            const container = document.getElementById('tableContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-baseball"></i>
                        <div class="empty-title">没有符合条件的数据</div>
                        <div class="empty-desc">尝试调整筛选条件或搜索关键词</div>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>昵称</th>
                                <th>注册时间</th>
                                <th>理由</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filtered.forEach(user => {
                const statusBadge = {
                    pending: '<span class="badge badge-pending">待审核</span>',
                    approved: '<span class="badge badge-approved">已通过</span>',
                    rejected: '<span class="badge badge-rejected">已拒绝</span>',
                    disabled: '<span class="badge badge-disabled">已禁用</span>'
                }[user.status] || '';

                let actions = '';
                if (user.status === 'pending') {
                    actions = `
                        <button class="btn-approve" onclick="approveUser('${user.id}')">
                            <i class="fa-regular fa-check"></i> 批准
                        </button>
                        <button class="btn-reject" onclick="showRejectModal('${user.id}')">
                            <i class="fa-regular fa-xmark"></i> 拒绝
                        </button>
                    `;
                } else if (user.status === 'approved') {
                    actions = `
                        <button class="btn-disable" onclick="disableUser('${user.id}')">
                            <i class="fa-regular fa-circle-pause"></i> 禁用
                        </button>
                    `;
                } else if (user.status === 'disabled') {
                    actions = `
                        <button class="btn-enable" onclick="enableUser('${user.id}')">
                            <i class="fa-regular fa-play"></i> 启用
                        </button>
                    `;
                } else if (user.status === 'rejected') {
                    actions = `
                        <button class="btn-approve" onclick="approveUser('${user.id}')">
                            <i class="fa-regular fa-check"></i> 重新批准
                        </button>
                    `;
                }
                actions += `
                    <button class="btn-delete" onclick="deleteUser('${user.id}')">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                `;

                html += `
                    <tr>
                        <td><strong>${user.username || '-'}</strong></td>
                        <td>${user.email || '-'}</td>
                        <td>${user.nickname || '-'}</td>
                        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-'}</td>
                        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${user.reason || '-'}</td>
                        <td>${statusBadge}</td>
                        <td><div class="action-btns">${actions}</div></td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ==================== Edge Function 调用 ====================
        async function callAdminFunction(endpoint, body) {
            const { data: { session } } = await supabaseAuth.auth.getSession();
            if (!session) throw new Error('登录已过期，请重新登录');
            const response = await fetch(`${SUPABASE_URL}/functions/v1/${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`
                },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || '操作失败');
            }
            return response.json();
        }

        // ==================== 操作函数 ====================
        window.approveUser = async (id) => {
            try {
                await callAdminFunction('admin-approve-user', { userId: id });
                loadData();
            } catch (err) {
                alert('批准失败：' + err.message);
            }
        };

        window.disableUser = async (id) => {
            try {
                await callAdminFunction('admin-disable-user', { userId: id });
                loadData();
            } catch (err) {
                alert('禁用失败：' + err.message);
            }
        };

        window.enableUser = async (id) => {
            try {
                await callAdminFunction('admin-enable-user', { userId: id });
                loadData();
            } catch (err) {
                alert('启用失败：' + err.message);
            }
        };

        window.deleteUser = async (id) => {
            if (!confirm('确定要删除该用户吗？此操作不可逆！')) return;
            try {
                await callAdminFunction('admin-delete-user', { userId: id });
                loadData();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        };

        // ==================== 拒绝模态框 ====================
        let currentRejectId = null;
        window.showRejectModal = (id) => {
            currentRejectId = id;
            document.getElementById('rejectModal').style.display = 'flex';
        };

        document.getElementById('cancelRejectBtn').addEventListener('click', () => {
            document.getElementById('rejectModal').style.display = 'none';
            document.getElementById('rejectReason').value = '';
            currentRejectId = null;
        });

        document.getElementById('confirmRejectBtn').addEventListener('click', async () => {
            const reason = document.getElementById('rejectReason').value.trim();
            try {
                await callAdminFunction('admin-reject-user', {
                    userId: currentRejectId,
                    reason: reason || undefined
                });
                document.getElementById('rejectModal').style.display = 'none';
                document.getElementById('rejectReason').value = '';
                currentRejectId = null;
                loadData();
            } catch (err) {
                alert('拒绝失败：' + err.message);
            }
        });

        // 点击模态框背景关闭
        document.getElementById('rejectModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('rejectModal').style.display = 'none';
                document.getElementById('rejectReason').value = '';
                currentRejectId = null;
            }
        });
    </script>
</body>
</html>
