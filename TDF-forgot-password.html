<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            /* 4色渐变 - 动态流动背景 (固定视口，制造沉浸感) */
            background-image: linear-gradient(125deg, #8d4bbb, #4b5cc4, #ff4e20, #21a675);
            background-size: 300% 300%;
            background-attachment: fixed;   /* 背景固定视口，不随滚动移动 */
        /* animation: flowGradient 14s ease infinite alternate;  */
            animation: flowGradient 20s linear infinite; 
            
            position: relative;
            /* 保证文字层级高于装饰层 */
            z-index: 0;
        }

        /* ---------- 背景样式 ---------- */
        /* 动态4色渐变动画： 移动色彩位置，产生流动感 */
        @keyframes flowGradient {
            0%   { background-position: 0% 20%; }
            20%  { background-position: 30% 50%; }
            40%  { background-position: 70% 30%; }
            60%  { background-position: 100% 60%; }
            80%  { background-position: 50% 80%; }
            100% { background-position: 0% 20%; }
        }
        /* ----- 浅色网格层 (固定视口，半透明细腻网格) ----- */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;   /* 让鼠标事件穿透，不干扰点击内容 */
            z-index: 1;
            /* 网格图案：横竖交织的浅色线条，柔和醒目 */
            background-image: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px);
            /* 额外增加微光光晕增强质感 */
            background-blend-mode: overlay;
        }/* 点缀: 主网格交叉点增加细小微光 (可选，增强浅色质感) */
        .grid-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
        }

        /* ----- 闪烁圆点画布层 ----- */
        #dots-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 2;
        }
        /* 同 login 页面样式，省略，您可复用前面的 CSS */
        :root {
            --primary: #2b6ef3;;
            --primary-hover: #1d5bd6;
            --primary-light: #EEF2FF;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --warning: #F59E0B;
            --warning-bg: #FFFBEB;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card{background:var(--card-bg);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:420px;padding:40px 36px 36px;text-align:center;z-index: 999;}
        .card .icon-circle{width:52px;height:52px;border-radius:50%;background:#EEF2FF;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;}
        .card h1{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;}
        .card p{font-size:14px;color:var(--text-secondary);margin-bottom:24px;}
        .form-group{margin-bottom:18px;text-align:left;}
        .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
        .form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#fafbfc;outline:none;transition:var(--transition);}
        .form-group input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,0.08);}
        .btn{width:100%;padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);}
        .btn-primary{background:var(--primary);color:#fff;}
        .btn-primary:hover{background:#1d5bd6;;transform:translateY(-1px);}
        .btn-primary:disabled{background:#a5b4fc;cursor:not-allowed;}
        .success-box{background:#ECFDF5;border-radius:10px;padding:16px;color:#059669;font-size:14px;margin-bottom:20px;display:none;text-align:center;}
        .success-box.visible{display:block;}
        .card-footer{margin-top:16px;font-size:14px;color:var(--text-secondary);}
        .card-footer a{color:var(--primary);text-decoration:none;font-weight:500;}
        .card-footer a:hover{text-decoration:underline;}
    </style>
</head>
<body>
     <!-- 浅色网格固定层 -->
     <div class="grid-overlay"></div>   
     <!-- 动态闪烁圆点 canvas 层 -->
     <canvas id="dots-canvas"></canvas>

    <div class="card">

        <div class="success-box" id="successBox">✅ 重置邮件已发送！请检查您的邮箱（Supabase 会自动发送）。</div>

        </form>

            <a href="TDFChat.html">← 返回登录</a>

    </div>

    <script>
        const SUPABASE_URL = 'https://zsyswamtmhqitsqbolut.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lkwHgCi9HYVKgHxVTw_7UQ_U5PRng_W';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.querySelector('#btnText').textContent = '发送中...';
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/TDF-reset-password.html',
            });
            if (error) {
                alert('发送失败：' + error.message);
                btn.disabled = false;
                btn.querySelector('#btnText').textContent = '发送重置链接';
            } else {
                document.getElementById('successBox').classList.add('visible');
                document.getElementById('forgotForm').style.display = 'none';
            }
        });
        (function() {
            // ---------- 闪烁圆点 Canvas 实现 ----------
            const canvas = document.getElementById('dots-canvas');
            let ctx = canvas.getContext('2d');
            
            // 存储圆点数据：位置，半径，闪烁速度，相位偏移，可带微色彩（柔和金色/白）
            let dots = [];
            let animationFrameId = null;
            let winWidth = window.innerWidth;
            let winHeight = window.innerHeight;
            
            // 圆点数量：根据屏幕尺寸适当调整，保证性能且丰富（大屏多一些，小屏适中）
            const getDotsCount = () => {
                const area = winWidth * winHeight;
                if (area < 400000) return 10;      // 手机
                if (area < 1200000) return 20;     // 平板
                return 40;                         // 桌面大屏
            };
            
            // 随机范围函数
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }
            
            // 生成圆点阵列 (位置基于当前窗口尺寸)
            function generateDots() {
                const count = getDotsCount();
                const newDots = [];
                for (let i = 0; i < count; i++) {
                    // 圆点坐标均匀分布在画布范围内，且避免边缘过挤
                    const x = randomRange(20, winWidth - 20);
                    const y = randomRange(20, winHeight - 20);
                    // 半径 2~7px 之间微妙差异
                    const radius = randomRange(2.2, 6.5);
                    // 闪烁频率：0.5~2.2 rad/s 不同速度，产生错落闪烁
                    const speed = randomRange(0.6, 2.4);
                    // 相位偏移 0 到 2PI，起始不同
                    const phase = randomRange(0, Math.PI * 2);
                    // 轻微色彩倾向：主体为纯白/淡金色，极少数冷色点缀，完全符合浅色柔光
                    // 选温柔光谱
                    let colorStyle = {
                        r: 255,
                        g: 240 + Math.random() * 15,
                        b: 200 + Math.random() * 40,
                        alphaBase: 0.5
                    };
                    // 10%的概率让圆点带一点点清冷微蓝，丰富层次
                    if (Math.random() < 0.15) {
                        colorStyle = {
                            r: 210 + Math.random() * 45,
                            g: 225 + Math.random() * 30,
                            b: 250,
                            alphaBase: 0.55
                        };
                    }
                    newDots.push({
                        x, y, radius,
                        speed: speed,
                        phase: phase,
                        color: colorStyle,
                        // 微小振幅用来增加轻微半径波动（可不启用，但增加动态丰富度）
                        radiusAmp: randomRange(0, 0.6),
                        radiusSpeed: randomRange(0.8, 1.8)
                    });
                }
                return newDots;
            }
            
            // 重绘画布 (基于当前时间戳计算每个圆点的透明度Alpha及微半径变化)
            let lastTimestamp = 0;
            function drawDots(nowTime) {
                if (!ctx) return;
                // 清除画布（透明背景）
                ctx.clearRect(0, 0, winWidth, winHeight);
                
                // 获取全局时间秒数（用于正弦波闪烁）
                const seconds = (nowTime || performance.now()) / 1000;
                
                for (let i = 0; i < dots.length; i++) {
                    const d = dots[i];
                    // 动态透明度: alpha 在 0.25 ~ 0.85 之间优雅闪烁 sin 值域 [-1,1] -> 映射到 0.3~0.9
                    let sinVal = Math.sin(seconds * d.speed + d.phase);
                    let alpha = 0.35 + (sinVal + 1) / 2 * 0.55;   // 范围 0.35~0.9
                    // 增加轻微呼吸上限，避免过暗
                    alpha = Math.min(0.92, Math.max(0.28, alpha));
                    
                    // 半径微动态 (呼吸轻微缩放，增加灵动)
                    let dynamicRadius = d.radius;
                    if (d.radiusAmp > 0.01) {
                        const radiusSin = Math.sin(seconds * d.radiusSpeed + d.phase);
                        dynamicRadius = d.radius + radiusSin * d.radiusAmp;
                        dynamicRadius = Math.max(1.5, dynamicRadius);
                    }
                    
                    // 颜色设置 (带闪烁透明度)
                    const { r, g, b } = d.color;
                    ctx.beginPath();
                    // 轻微模糊光晕效果 (增加柔和感，但不影响性能过重)
                    ctx.shadowBlur = 0;  // 为了性能不启用阴影，但用径向渐变轻微光晕? 简单使用glow-like
                    ctx.arc(d.x, d.y, dynamicRadius, 0, Math.PI * 2);
                    // 填充圆点，颜色柔和带闪烁alpha
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                    ctx.fill();
                    
                    // 增加小部分圆点的高光内芯（可选, 让部分星星更生动)
                    if (alpha > 0.6 && dynamicRadius > 3) {
                        ctx.beginPath();
                        ctx.arc(d.x - 0.8, d.y - 0.8, dynamicRadius * 0.28, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 248, 225, ${alpha * 0.5})`;
                        ctx.fill();
                    }
                }
                // 可选: 极少数悬浮流光粒子感 (不做过多处理)
            }
            
            // 动画循环
            let renderLoop = (time) => {
                if (!canvas || !ctx) return;
                drawDots(time);
                animationFrameId = requestAnimationFrame(renderLoop);
            };
            
            // 窗口大小改变时 重新配置canvas尺寸 + 重新生成圆点位置 (适配新尺寸)
            function resizeCanvasAndDots() {
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                if (canvas) {
                    canvas.width = winWidth;
                    canvas.height = winHeight;
                    // 重置画布样式尺寸
                    canvas.style.width = `${winWidth}px`;
                    canvas.style.height = `${winHeight}px`;
                    // 根据新尺寸重新生成点位置
                    dots = generateDots();
                    // 瞬间刷新一帧，避免旧坐标遗留
                    if (ctx) {
                        ctx.clearRect(0, 0, winWidth, winHeight);
                        drawDots(performance.now());
                    }
                }
            }
            
            // 节流防抖，确保resize时性能良好
            let resizeTimer;
            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    resizeCanvasAndDots();
                }, 120);
            }
            
            // 初始化Canvas及一切
            function initCanvasAndDots() {
                if (!canvas) return;
                ctx = canvas.getContext('2d');
                if (!ctx) return;
                // 设置实际像素尺寸
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                canvas.width = winWidth;
                canvas.height = winHeight;
                canvas.style.width = `${winWidth}px`;
                canvas.style.height = `${winHeight}px`;
                
                // 生成圆点数据
                dots = generateDots();
                
                // 开始动画
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(renderLoop);
                
                // 监听resize
                window.addEventListener('resize', handleResize);
            }
            
            // 使用页面可见性API, 页面隐藏时停止动画优化性能 (可选)
            function handleVisibilityChange() {
                if (document.hidden) {
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                } else {
                    if (!animationFrameId && ctx) {
                        // 重启动画前重绘一帧
                        drawDots(performance.now());
                        animationFrameId = requestAnimationFrame(renderLoop);
                    }
                }
            }
            
            // 启动所有特效
            function start() {
                initCanvasAndDots();
                document.addEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 优雅销毁 (防止内存)
            function cleanUp() {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                window.removeEventListener('resize', handleResize);
                document.removeEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 开始
            start();
            // 页面unload时清理（非必须但干净）
            window.addEventListener('beforeunload', () => {
                cleanUp();
            });
        })();
    </script>
    <!-- ====== 鼠标点击粒子效果 ====== -->
        <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></canvas>
        <script>
            (function() {
                const canvas = document.getElementById('particleCanvas');
                const ctx = canvas.getContext('2d');
                let width, height;
    
                function resize() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();
    
                // 粒子数组
                let particles = [];
    
                // 粒子类
                class Particle {
                    constructor(x, y) {
                        this.x = x;
                        this.y = y;
                        // 随机速度方向
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 4 + 2; // 2~6 px/帧
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed - 0.5; // 轻微向上偏移，更有烟花感
                        // 大小随机
                        this.radius = Math.random() * 4 + 2;
                        // 颜色 (HSL 彩虹)
                        this.hue = Math.random() * 360;
                        this.saturation = 100;
                        this.lightness = 60;
                        // 透明度
                        this.alpha = 1;
                        // 重力（让粒子缓缓下落）
                        this.gravity = 0.08;
                        // 寿命（帧数）
                        this.life = 1;
                        this.decay = 0.008 + Math.random() * 0.01; // 每帧衰减
                    }
    
                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vy += this.gravity; // 重力
                        // 速度逐渐减小（空气阻力）
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                        // 透明度衰减
                        this.alpha -= this.decay;
                        // 半径缓慢缩小
                        this.radius *= 0.995;
                        this.life -= 0.01;
                    }
    
                    draw() {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, this.alpha);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
                        ctx.fillStyle = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
                        ctx.fill();
                        // 加一点辉光
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                        ctx.fill();
                        ctx.restore();
                    }
    
                    isDead() {
                        return this.alpha <= 0 || this.radius < 0.3 || this.life <= 0;
                    }
                }
    
                // 生成粒子
                function createParticles(x, y, count = 35) {
                    for (let i = 0; i < count; i++) {
                        particles.push(new Particle(x, y));
                    }
                }
    
                // 动画循环
                function animate() {
                    // 清空画布（透明，让粒子叠加）
                    ctx.clearRect(0, 0, width, height);
                    // 更新并绘制每个粒子
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.update();
                        p.draw();
                        if (p.isDead()) {
                            particles.splice(i, 1);
                        }
                    }
                    requestAnimationFrame(animate);
                }
    
                // 监听点击事件
                document.addEventListener('click', function(e) {
                    // 获取点击位置（相对于视口）
                    const x = e.clientX;
                    const y = e.clientY;
                    // 生成粒子，数量可在 25~50 之间调整
                    createParticles(x, y, 30 + Math.floor(Math.random() * 20));
                });
    
                // 启动动画
                animate();
    
                // 可选：页面关闭时清理
                window.addEventListener('beforeunload', function() {
                    particles = [];
                });
            })();
    </script>
