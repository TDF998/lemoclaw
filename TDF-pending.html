<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核等待中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            /* 4色渐变 - 动态流动背景 (固定视口，制造沉浸感) */
            background-image: linear-gradient(125deg, #8d4bbb, #4b5cc4, #ff4e20, #21a675);
            background-size: 300% 300%;
            background-attachment: fixed;   /* 背景固定视口，不随滚动移动 */
        /* animation: flowGradient 14s ease infinite alternate;  */
            animation: flowGradient 20s linear infinite; 
            
            position: relative;
            /* 保证文字层级高于装饰层 */
            z-index: 0;
        }

        /* ---------- 背景样式 ---------- */
        /* 动态4色渐变动画： 移动色彩位置，产生流动感 */
        @keyframes flowGradient {
            0%   { background-position: 0% 20%; }
            20%  { background-position: 30% 50%; }
            40%  { background-position: 70% 30%; }
            60%  { background-position: 100% 60%; }
            80%  { background-position: 50% 80%; }
            100% { background-position: 0% 20%; }
        }
        /* ----- 浅色网格层 (固定视口，半透明细腻网格) ----- */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;   /* 让鼠标事件穿透，不干扰点击内容 */
            z-index: 1;
            /* 网格图案：横竖交织的浅色线条，柔和醒目 */
            background-image: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px);
            /* 额外增加微光光晕增强质感 */
            background-blend-mode: overlay;
        }/* 点缀: 主网格交叉点增加细小微光 (可选，增强浅色质感) */
        .grid-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
        }

        /* ----- 闪烁圆点画布层 ----- */
        #dots-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 2;
        }
        :root {
            --primary: #2b6ef3;;
            --primary-hover: #1d5bd6;
            --primary-light: #EEF2FF;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --warning: #F59E0B;
            --warning-bg: #FFFBEB;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reject-reason {
            background: #FEF2F2;
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: left;
            line-height: 1.6;
        }

        .contact-info {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid var(--border);
        }
        .contact-info .label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .contact-info .value {
            color: var(--text);
            font-weight: 500;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
       
        .card { background:var(--card-bg); border-radius:16px; box-shadow:var(--shadow-lg); width:100%; max-width:480px; padding:44px 36px 36px; text-align:center; animation: fadeInUp 0.5s ease; z-index: 999; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .status-icon { width:80px; height:80px; border-radius:50%; background:#FFFBEB; display:inline-flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:20px; animation: pulse 2s ease-in-out infinite; }
        .status-icon i {color: #2b6ef3;}
        @keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,0.3); } 50% { box-shadow:0 0 0 16px rgba(245,158,11,0); } }
        .card h1 { font-size:22px; font-weight:700; color:var(--text); margin-bottom:10px; }
        .card .message { font-size:15px; color:var(--text-secondary); line-height:1.6; margin-bottom:24px; }
        .card .user-info { background:#f8fafc; border-radius:10px; padding:18px 18px; margin-bottom:24px; text-align:left; font-size:16px; color:var(--text-secondary); border:1px solid var(--border);line-height: 24px; }
        .card .user-info span { font-weight:600; color:var(--text); }
        .btn { padding:11px 24px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:var(--transition); display:inline-block; text-decoration:none; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:#1d5bd6; transform:translateY(-1px); }
        .btn-outline { background:#fff; color:var(--text); border:1.5px solid var(--border); }
        .btn-outline:hover { background:#f8fafc; }
        .btn-group { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
        .auto-check { font-size:12px; color:#94a3b8; margin-top:14px; }
        .error-card { background:#FEF2F2; border-radius:12px; padding:20px; color:#DC2626; text-align:center; }
    </style>
</head>
<body>
    <!-- 浅色网格固定层 -->
    <div class="grid-overlay"></div>   
    <!-- 动态闪烁圆点 canvas 层 -->
    <canvas id="dots-canvas"></canvas>
    <div class="card" id="pendingCard">
        <div class="status-icon">⏳</div>
        <h1>加载中...</h1>
        <p class="message">正在检查审核状态</p>
    </div>

    <script>
        // ================================================================
        //  🔧 配置区域 — 请替换为你自己的 Supabase 项目信息
        // ================================================================
        const SUPABASE_URL = 'https://zsyswamtmhqitsqbolut.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lkwHgCi9HYVKgHxVTw_7UQ_U5PRng_W';

        if (SUPABASE_URL.includes('YOUR_PROJECT') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
            alert('⚠️ 请先在代码顶部配置 SUPABASE_URL 和 SUPABASE_ANON_KEY');
        }

        // ================================================================
        //  初始化 Supabase
        // ================================================================
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
            storage: sessionStorage,  
            }
        });

        // 工具函数
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 渲染等待视图（增加 email 参数）
        function renderPendingView(profile, email) {
            const card = document.getElementById('pendingCard');
            card.innerHTML = `
                <div class="status-icon">⏳</div>
                <h1>审核等待中</h1>
                <p class="message">您的账号正在审核中，请耐心等待管理员通过。<br>审核通过后将自动为您跳转到主页。</p>
                <div class="user-info">
                    用户名：<span>${escapeHtml(profile.username || '未知')}</span><br>
                    邮箱：<span>${escapeHtml(email || '未知')}</span><br>
                    注册时间：<span>${profile.created_at ? new Date(profile.created_at).toLocaleString() : '未知'}</span>
                    ${profile.reason ? '<br>申请理由：<span>' + escapeHtml(profile.reason) + '</span>' : ''}
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="refreshBtn">刷新状态</button>
                    <button class="btn btn-outline" id="logoutBtn">注销 / 返回登录</button>
                </div>
                <p class="auto-check">⏱ 页面每15秒自动检查一次审核状态</p>
            `;
            document.getElementById('refreshBtn').addEventListener('click', checkStatus);
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabaseClient.auth.signOut();
                window.location.replace('TDFChat.html?_t=' + Date.now());
            });
            startAutoCheck();
        }
      
        // 渲染拒绝视图（增加 email 参数）
        function renderRejectedView(profile, email) {
            const card = document.getElementById('pendingCard');
            card.innerHTML = `
                <div class="status-icon status-rejected"><i class="fa-solid fa-face-beam-hand-over-mouth"></i></div>
                <div><span style="display:inline-block;background:#FEF2F2;color:#DC2626;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:16px;">审核未通过</span></div>
                <h1>审核未通过</h1>
                <p class="message">很遗憾，您的注册申请未被管理员通过。</p>
                ${profile.reject_reason ? `
                    <div class="reject-reason">
                        <strong>📌 拒绝原因：</strong><br>
                        ${escapeHtml(profile.reject_reason)}
                    </div>
                ` : ''}
                <div class="user-info" style="text-align:center;">
                   邮箱：<span>${escapeHtml(email || '未知')}</span>
                </div>
                <div class="contact-info">
            <div style="font-size:14px; color:var(--text-secondary); line-height:2;">
                管理员邮箱：<span class="copyable" data-text="admin@example.com" style="color:var(--text); font-weight:500; cursor:pointer; border-bottom:1px dashed #94a3b8;">admin@example.com</span><br>
                联系电话：<span class="copyable" data-text="138-0000-8888" style="color:var(--text); font-weight:500; cursor:pointer; border-bottom:1px dashed #94a3b8;">138-0000-8888</span><br>
                工作时间：<span style="color:var(--text); font-weight:500;">周一至周五 9:00-18:00</span>
            </div>
            <div id="copyTip" style="font-size:14px; color:#94a3b8; margin-top:8px; text-align:center;">点击邮箱或电话可复制</div>
        </div>
                <div class="btn-group">
                    <button class="btn btn-outline" id="logoutBtn">退出登录</button>
                </div>
            `;
             // 复制功能
                document.querySelectorAll('.copyable').forEach(el => {
                    el.addEventListener('click', function() {
                        const text = this.dataset.text;
                        navigator.clipboard.writeText(text).then(() => {
                            const tip = document.getElementById('copyTip');
                            const originalText = tip.textContent;
                            tip.textContent = '✅ 已复制！';
                            tip.style.color = '#10B981';
                            setTimeout(() => {
                                tip.textContent = originalText;
                                tip.style.color = '#94a3b8';
                            }, 2000);
                        }).catch(() => {
                            // 降级方案
                            const input = document.createElement('input');
                            input.value = text;
                            document.body.appendChild(input);
                            input.select();
                            document.execCommand('copy');
                            input.remove();
                            const tip = document.getElementById('copyTip');
                            const originalText = tip.textContent;
                            tip.textContent = '✅ 已复制！';
                            tip.style.color = '#10B981';
                            setTimeout(() => {
                                tip.textContent = originalText;
                                tip.style.color = '#94a3b8';
                            }, 2000);
                        });
                    });
                });

                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await supabaseClient.auth.signOut();
                    window.location.href = 'TDFChat.html?logout=true';
                });
            }

        function renderNeedLogin() {
            const card = document.getElementById('pendingCard');
            card.innerHTML = `
                <div class="status-icon" style="background:#F1F5F9;"><i class="fa-solid fa-face-grin-tongue-squint"></i></div>
                <h1>需要登录</h1>
                <p class="message">此页面需要登录后才能查看审核状态。</p>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="location.href='TDFChat.html'">前往登录页</button>
                </div>
            `;
        }

        function renderError(msg) {
            const card = document.getElementById('pendingCard');
            card.innerHTML = `
                <div class="error-card">
                    <h2>⚠️ 数据加载失败</h2>
                    <p>${escapeHtml(msg)}</p>
                    <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">重新加载</button>
                </div>
            `;
        }

        // 检查状态函数（从用户对象获取 email）
        async function checkStatus() {
            // 使用 getSession 代替 getUser
            const { data, error } = await supabaseClient.auth.getSession();
            if (error || !data.session) {
                renderNeedLogin();
                return;
            }

            const user = data.session.user;
            if (!user) {
                renderNeedLogin();
                return;
            }

            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (profileError) {
                console.error('查询失败：', profileError);
                renderError(profileError.message);
                return;
            }
            if (!profile) {
                renderError('用户信息不存在，请联系管理员。');
                return;
            }

            const email = user.email;

            if (profile.status === 'rejected') {
                renderRejectedView(profile, email);
                return;
            } else if (profile.status === 'pending') {
                renderPendingView(profile, email);
                return;
            } else if (profile.status === 'approved') {
                window.location.href = 'TDFChat.html';
                return;
            } else {
                renderError('未知状态，请联系管理员');
            }
        }
        function startAutoCheck() {
            if (autoCheckInterval) clearInterval(autoCheckInterval);
            autoCheckInterval = setInterval(async () => {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) return;
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('status')
                    .eq('id', user.id)
                    .single();
                if (profile && profile.status === 'approved') {
                    window.location.href = 'TDFChat.html';
                } else if (profile && profile.status === 'rejected') {
                    checkStatus(); // 重新拉取完整数据并显示拒绝视图
                }
            }, 15000);
        }

        // 页面初始化
        (async function init() {
            console.log('🚀 TDF-pending.html 初始化');

            // 使用 getSession 获取用户（更可靠）
            const { data, error } = await supabaseClient.auth.getSession();
            console.log('📌 getSession 结果:', data);

            if (error || !data.session) {
                console.error('❌ 没有 session:', error);
                renderNeedLogin();
                return;
            }

            const user = data.session.user;
            if (!user) {
                console.error('❌ 没有用户');
                renderNeedLogin();
                return;
            }

            console.log('✅ 获取到用户:', user.email);

            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (profileError) {
                console.error('❌ 查询 profile 失败:', profileError);
                renderError(profileError.message);
                return;
            }
            if (!profile) {
                renderError('未找到用户信息。');
                return;
            }

            console.log('✅ 用户状态:', profile.status);

            const email = user.email;

            if (profile.status === 'approved') {
                window.location.href = 'TDFChat.html';
            } else if (profile.status === 'rejected') {
                renderRejectedView(profile, email);
            } else if (profile.status === 'pending') {
                renderPendingView(profile, email);
            } else {
                renderError('未知状态，请联系管理员');
            }
    })();
        (function() {
            // ---------- 闪烁圆点 Canvas 实现 ----------
            const canvas = document.getElementById('dots-canvas');
            let ctx = canvas.getContext('2d');
            
            // 存储圆点数据：位置，半径，闪烁速度，相位偏移，可带微色彩（柔和金色/白）
            let dots = [];
            let animationFrameId = null;
            let winWidth = window.innerWidth;
            let winHeight = window.innerHeight;
            
            // 圆点数量：根据屏幕尺寸适当调整，保证性能且丰富（大屏多一些，小屏适中）
            const getDotsCount = () => {
                const area = winWidth * winHeight;
                if (area < 400000) return 10;      // 手机
                if (area < 1200000) return 20;     // 平板
                return 40;                         // 桌面大屏
            };
            
            // 随机范围函数
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }
            
            // 生成圆点阵列 (位置基于当前窗口尺寸)
            function generateDots() {
                const count = getDotsCount();
                const newDots = [];
                for (let i = 0; i < count; i++) {
                    // 圆点坐标均匀分布在画布范围内，且避免边缘过挤
                    const x = randomRange(20, winWidth - 20);
                    const y = randomRange(20, winHeight - 20);
                    // 半径 2~7px 之间微妙差异
                    const radius = randomRange(2.2, 6.5);
                    // 闪烁频率：0.5~2.2 rad/s 不同速度，产生错落闪烁
                    const speed = randomRange(0.6, 2.4);
                    // 相位偏移 0 到 2PI，起始不同
                    const phase = randomRange(0, Math.PI * 2);
                    // 轻微色彩倾向：主体为纯白/淡金色，极少数冷色点缀，完全符合浅色柔光
                    // 选温柔光谱
                    let colorStyle = {
                        r: 255,
                        g: 240 + Math.random() * 15,
                        b: 200 + Math.random() * 40,
                        alphaBase: 0.5
                    };
                    // 10%的概率让圆点带一点点清冷微蓝，丰富层次
                    if (Math.random() < 0.15) {
                        colorStyle = {
                            r: 210 + Math.random() * 45,
                            g: 225 + Math.random() * 30,
                            b: 250,
                            alphaBase: 0.55
                        };
                    }
                    newDots.push({
                        x, y, radius,
                        speed: speed,
                        phase: phase,
                        color: colorStyle,
                        // 微小振幅用来增加轻微半径波动（可不启用，但增加动态丰富度）
                        radiusAmp: randomRange(0, 0.6),
                        radiusSpeed: randomRange(0.8, 1.8)
                    });
                }
                return newDots;
            }
            
            // 重绘画布 (基于当前时间戳计算每个圆点的透明度Alpha及微半径变化)
            let lastTimestamp = 0;
            function drawDots(nowTime) {
                if (!ctx) return;
                // 清除画布（透明背景）
                ctx.clearRect(0, 0, winWidth, winHeight);
                
                // 获取全局时间秒数（用于正弦波闪烁）
                const seconds = (nowTime || performance.now()) / 1000;
                
                for (let i = 0; i < dots.length; i++) {
                    const d = dots[i];
                    // 动态透明度: alpha 在 0.25 ~ 0.85 之间优雅闪烁 sin 值域 [-1,1] -> 映射到 0.3~0.9
                    let sinVal = Math.sin(seconds * d.speed + d.phase);
                    let alpha = 0.35 + (sinVal + 1) / 2 * 0.55;   // 范围 0.35~0.9
                    // 增加轻微呼吸上限，避免过暗
                    alpha = Math.min(0.92, Math.max(0.28, alpha));
                    
                    // 半径微动态 (呼吸轻微缩放，增加灵动)
                    let dynamicRadius = d.radius;
                    if (d.radiusAmp > 0.01) {
                        const radiusSin = Math.sin(seconds * d.radiusSpeed + d.phase);
                        dynamicRadius = d.radius + radiusSin * d.radiusAmp;
                        dynamicRadius = Math.max(1.5, dynamicRadius);
                    }
                    
                    // 颜色设置 (带闪烁透明度)
                    const { r, g, b } = d.color;
                    ctx.beginPath();
                    // 轻微模糊光晕效果 (增加柔和感，但不影响性能过重)
                    ctx.shadowBlur = 0;  // 为了性能不启用阴影，但用径向渐变轻微光晕? 简单使用glow-like
                    ctx.arc(d.x, d.y, dynamicRadius, 0, Math.PI * 2);
                    // 填充圆点，颜色柔和带闪烁alpha
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                    ctx.fill();
                    
                    // 增加小部分圆点的高光内芯（可选, 让部分星星更生动)
                    if (alpha > 0.6 && dynamicRadius > 3) {
                        ctx.beginPath();
                        ctx.arc(d.x - 0.8, d.y - 0.8, dynamicRadius * 0.28, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 248, 225, ${alpha * 0.5})`;
                        ctx.fill();
                    }
                }
                // 可选: 极少数悬浮流光粒子感 (不做过多处理)
            }
            
            // 动画循环
            let renderLoop = (time) => {
                if (!canvas || !ctx) return;
                drawDots(time);
                animationFrameId = requestAnimationFrame(renderLoop);
            };
            
            // 窗口大小改变时 重新配置canvas尺寸 + 重新生成圆点位置 (适配新尺寸)
            function resizeCanvasAndDots() {
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                if (canvas) {
                    canvas.width = winWidth;
                    canvas.height = winHeight;
                    // 重置画布样式尺寸
                    canvas.style.width = `${winWidth}px`;
                    canvas.style.height = `${winHeight}px`;
                    // 根据新尺寸重新生成点位置
                    dots = generateDots();
                    // 瞬间刷新一帧，避免旧坐标遗留
                    if (ctx) {
                        ctx.clearRect(0, 0, winWidth, winHeight);
                        drawDots(performance.now());
                    }
                }
            }
            
            // 节流防抖，确保resize时性能良好
            let resizeTimer;
            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    resizeCanvasAndDots();
                }, 120);
            }
            
            // 初始化Canvas及一切
            function initCanvasAndDots() {
                if (!canvas) return;
                ctx = canvas.getContext('2d');
                if (!ctx) return;
                // 设置实际像素尺寸
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                canvas.width = winWidth;
                canvas.height = winHeight;
                canvas.style.width = `${winWidth}px`;
                canvas.style.height = `${winHeight}px`;
                
                // 生成圆点数据
                dots = generateDots();
                
                // 开始动画
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(renderLoop);
                
                // 监听resize
                window.addEventListener('resize', handleResize);
            }
            
            // 使用页面可见性API, 页面隐藏时停止动画优化性能 (可选)
            function handleVisibilityChange() {
                if (document.hidden) {
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                } else {
                    if (!animationFrameId && ctx) {
                        // 重启动画前重绘一帧
                        drawDots(performance.now());
                        animationFrameId = requestAnimationFrame(renderLoop);
                    }
                }
            }
            
            // 启动所有特效
            function start() {
                initCanvasAndDots();
                document.addEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 优雅销毁 (防止内存)
            function cleanUp() {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                window.removeEventListener('resize', handleResize);
                document.removeEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 开始
            start();
            // 页面unload时清理（非必须但干净）
            window.addEventListener('beforeunload', () => {
                cleanUp();
            });
        })();
    </script>
    <!-- ====== 鼠标点击粒子效果 ====== -->
    <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // 粒子数组
            let particles = [];

            // 粒子类
            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    // 随机速度方向
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2; // 2~6 px/帧
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 0.5; // 轻微向上偏移，更有烟花感
                    // 大小随机
                    this.radius = Math.random() * 4 + 2;
                    // 颜色 (HSL 彩虹)
                    this.hue = Math.random() * 360;
                    this.saturation = 100;
                    this.lightness = 60;
                    // 透明度
                    this.alpha = 1;
                    // 重力（让粒子缓缓下落）
                    this.gravity = 0.08;
                    // 寿命（帧数）
                    this.life = 1;
                    this.decay = 0.008 + Math.random() * 0.01; // 每帧衰减
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity; // 重力
                    // 速度逐渐减小（空气阻力）
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    // 透明度衰减
                    this.alpha -= this.decay;
                    // 半径缓慢缩小
                    this.radius *= 0.995;
                    this.life -= 0.01;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, this.alpha);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
                    ctx.fill();
                    // 加一点辉光
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                    ctx.fill();
                    ctx.restore();
                }

                isDead() {
                    return this.alpha <= 0 || this.radius < 0.3 || this.life <= 0;
                }
            }

            // 生成粒子
            function createParticles(x, y, count = 35) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y));
                }
            }

            // 动画循环
            function animate() {
                // 清空画布（透明，让粒子叠加）
                ctx.clearRect(0, 0, width, height);
                // 更新并绘制每个粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    if (p.isDead()) {
                        particles.splice(i, 1);
                    }
                }
                requestAnimationFrame(animate);
            }

            // 监听点击事件
            document.addEventListener('click', function(e) {
                // 获取点击位置（相对于视口）
                const x = e.clientX;
                const y = e.clientY;
                // 生成粒子，数量可在 25~50 之间调整
                createParticles(x, y, 30 + Math.floor(Math.random() * 20));
            });

            // 启动动画
            animate();

            // 可选：页面关闭时清理
            window.addEventListener('beforeunload', function() {
                particles = [];
            });
        })();
</script>
