<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 创建账号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- 引入 Supabase SDK -->
    <script src="supabase.js"></script>
    <style>
        :root {
            --primary: #2b6ef3;;
            --primary-hover: #1d5bd6;
            --primary-light: #EEF2FF;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --warning: #F59E0B;
            --warning-bg: #FFFBEB;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.05);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            /* 4色渐变 - 动态流动背景 (固定视口，制造沉浸感) */
            background-image: linear-gradient(125deg, #8d4bbb, #4b5cc4, #ff4e20, #21a675);
            background-size: 300% 300%;
            background-attachment: fixed;   /* 背景固定视口，不随滚动移动 */
        /* animation: flowGradient 14s ease infinite alternate;  */
            animation: flowGradient 20s linear infinite; 
            
            position: relative;
            /* 保证文字层级高于装饰层 */
            z-index: 0;
        }

        /* ---------- 背景样式 ---------- */
        /* 动态4色渐变动画： 移动色彩位置，产生流动感 */
        @keyframes flowGradient {
            0%   { background-position: 0% 20%; }
            20%  { background-position: 30% 50%; }
            40%  { background-position: 70% 30%; }
            60%  { background-position: 100% 60%; }
            80%  { background-position: 50% 80%; }
            100% { background-position: 0% 20%; }
        }
        /* ----- 浅色网格层 (固定视口，半透明细腻网格) ----- */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;   /* 让鼠标事件穿透，不干扰点击内容 */
            z-index: 1;
            /* 网格图案：横竖交织的浅色线条，柔和醒目 */
            background-image: 
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0px, rgba(255, 255, 255, 0.1) 1px, transparent 1px, transparent 36px);
            /* 额外增加微光光晕增强质感 */
            background-blend-mode: overlay;
        }/* 点缀: 主网格交叉点增加细小微光 (可选，增强浅色质感) */
        .grid-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
        }

        /* ----- 闪烁圆点画布层 ----- */
        #dots-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 2;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            padding: 40px 36px 36px;
            animation: fadeInUp 0.5s ease;
            z-index: 999;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .card-header .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-light);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 14px;
        }
        .icon-circle i{color:#2b6ef3;}

        .card-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .card-header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text);
            background: #fafbfc;
            transition: var(--transition);
            outline: none;
            font-family: inherit;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }
        .form-group input.error {
            border-color: var(--error);
            background: var(--error-bg);
        }
        .form-group .error-msg {
            font-size: 12px;
            color: var(--error);
            margin-top: 4px;
            display: none;
        }
        .form-group .error-msg.visible {
            display: block;
        }
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .password-strength .bar {
            height: 4px;
            flex: 1;
            border-radius: 2px;
            background: #e5e7eb;
            transition: var(--transition);
        }
        .password-strength .bar.weak {
            background: #EF4444;
        }
        .password-strength .bar.medium {
            background: #F59E0B;
        }
        .password-strength .bar.strong {
            background: #10B981;
        }
        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            color: var(--text-secondary);
        }
        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(70, 131, 229, 0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }
        .btn.loading .spinner {
            display: block;
        }
        .btn.loading .btn-text {
            opacity: 0.6;
        }
        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }
        .card-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .card-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .card-footer a:hover {
            text-decoration: underline;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            animation: slideInRight 0.35s ease, fadeOut 0.35s ease 3s forwards;
            pointer-events: auto;
            max-width: 380px;
            word-break: break-word;
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #DC2626;
        }
        .toast.info {
            background: #4F46E5;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px 24px;
                border-radius: 14px;
            }
            .card-header h1 {
                font-size: 20px;
            }
            .btn {
                font-size: 14px;
                padding: 11px 16px;
            }
        }


    </style>
</head>
<body>
    <!-- 浅色网格固定层 -->
    <div class="grid-overlay"></div>
    
    <!-- 动态闪烁圆点 canvas 层 -->
    <canvas id="dots-canvas"></canvas>

    <div class="card">
        <div class="card-header">
            <div class="icon-circle"><i class="fa-solid fa-face-grin-tongue-squint"></i></div>
            <h1>创建账号</h1>
            <p>注册后需等待管理员审核通过</p>
        </div>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="email">邮箱地址 <span style="color:#EF4444;">*</span></label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                <span class="error-msg" id="emailError">请输入有效的邮箱地址</span>
            </div>
            <div class="form-group">
                <label for="username">用户名 <span style="color:#EF4444;">*</span></label>
                <input type="text" id="username" name="username" placeholder="3-20个字符" required autocomplete="username" minlength="3" maxlength="20">
                <span class="error-msg" id="usernameError">用户名需为3-20个字符</span>
            </div>
            <div class="form-group">
                <label for="nickname">昵称 <span style="color:#94a3b8;"></span></label>
                <input type="text" id="nickname" name="nickname" placeholder="如何称呼您" maxlength="30">
            </div>
            <div class="form-group">
                <label for="reason">申请理由 / 备注 <span style="color:#EF4444;">*</span></label>
                <textarea id="reason" name="reason" rows="3" placeholder="请简要说明申请访问的原因，便于管理员审核..." maxlength="300"></textarea>
            </div>
            <div class="form-group">
                <label for="password">密码 <span style="color:#EF4444;">*</span></label>
                <input type="password" id="password" name="password" placeholder="至少6位，建议包含字母和数字" required minlength="6" autocomplete="new-password">
                <div class="password-strength" id="passwordStrengthBars">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </div>
                <span class="strength-text" id="strengthText"></span>
                <span class="error-msg" id="passwordError">密码至少需要6个字符</span>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码 <span style="color:#EF4444;">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required autocomplete="new-password">
                <span class="error-msg" id="confirmPasswordError">两次输入的密码不一致</span>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span class="btn-text">注册</span>
                <span class="spinner"></span>
            </button>
        </form>
        <div class="card-footer">
            已有账号？<a href="TDFChat.html">立即登录</a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ==================== Supabase 配置 ====================
            const SUPABASE_URL = 'https://zsyswamtmhqitsqbolut.supabase.co';   // 👈 替换为你的项目URL
            const SUPABASE_ANON_KEY = 'sb_publishable_lkwHgCi9HYVKgHxVTw_7UQ_U5PRng_W';                // 👈 替换为你的anon key
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // ============ 工具函数 ============
            const $ = (sel) => document.querySelector(sel);

            function showToast(message, type = 'info') {
                const container = $('#toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3400);
            }

            // 检查是否已登录，若已登录则跳转到对应页面
            (async function checkAlreadyLoggedIn() {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('status')
                        .eq('id', user.id)
                        .single();
                    if (profile) {
                        if (profile.status === 'approved') {
                            window.location.href = 'index.html';
                        } else if (profile.status === 'pending') {
                            window.location.href = 'TDF-pending.html';
                        }
                    }
                }
            })();

            // ============ 密码强度检测 ============
            const passwordInput = $('#password');
            const strengthBars = document.querySelectorAll('#passwordStrengthBars .bar');
            const strengthText = $('#strengthText');

            passwordInput.addEventListener('input', function() {
                const val = this.value;
                let score = 0;
                if (val.length >= 6) score++;
                if (val.length >= 8) score++;
                if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;
                if (/\d/.test(val)) score++;
                if (/[^a-zA-Z0-9]/.test(val)) score++;
                if (val.length >= 12) score++;

                strengthBars.forEach((bar, i) => {
                    bar.className = 'bar';
                    if (score <= 1 && i === 0) bar.classList.add('weak');
                    if (score === 2 && i <= 1) bar.classList.add('weak');
                    if (score === 3 && i <= 1) bar.classList.add('medium');
                    if (score === 3 && i === 2) bar.classList.add('medium');
                    if (score >= 4 && i <= 2) bar.classList.add('strong');
                    if (score >= 4 && i === 3) bar.classList.add('strong');
                    if (score >= 5 && i <= 3) bar.classList.add('strong');
                });

                if (score <= 1) strengthText.textContent = '强度：弱 - 请增加密码长度和复杂度';
                else if (score <= 2) strengthText.textContent = '强度：较弱 - 建议添加数字或特殊字符';
                else if (score <= 3) strengthText.textContent = '强度：中等 - 可以更进一步';
                else if (score <= 4) strengthText.textContent = '强度：强 ✓';
                else strengthText.textContent = '强度：非常强 ✓✓';
            });

            // ============ 表单验证与提交 ============
            const form = $('#registerForm');
            const submitBtn = $('#submitBtn');
            let isSubmitting = false;

            function showFieldError(fieldId, errorId, show) {
                const input = $('#' + fieldId);
                const errorEl = $('#' + errorId);
                if (show) {
                    input.classList.add('error');
                    errorEl.classList.add('visible');
                } else {
                    input.classList.remove('error');
                    errorEl.classList.remove('visible');
                }
            }

            function validateForm() {
                let isValid = true;
                const email = $('#email').value.trim();
                const username = $('#username').value.trim();
                const password = $('#password').value;
                const confirmPassword = $('#confirmPassword').value;

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!email || !emailRegex.test(email)) {
                    showFieldError('email', 'emailError', true);
                    isValid = false;
                } else {
                    showFieldError('email', 'emailError', false);
                }

                if (!username || username.length < 3 || username.length > 20) {
                    showFieldError('username', 'usernameError', true);
                    isValid = false;
                } else if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) {
                    $('#usernameError').textContent = '用户名只能包含字母、数字、下划线和中文';
                    showFieldError('username', 'usernameError', true);
                    isValid = false;
                } else {
                    $('#usernameError').textContent = '用户名需为3-20个字符';
                    showFieldError('username', 'usernameError', false);
                }

                if (!password || password.length < 6) {
                    showFieldError('password', 'passwordError', true);
                    isValid = false;
                } else {
                    showFieldError('password', 'passwordError', false);
                }

                if (!confirmPassword || confirmPassword !== password) {
                    showFieldError('confirmPassword', 'confirmPasswordError', true);
                    isValid = false;
                } else {
                    showFieldError('confirmPassword', 'confirmPasswordError', false);
                }

                return isValid;
            }

            ['email', 'username', 'password', 'confirmPassword'].forEach(id => {
                $('#' + id).addEventListener('input', function() {
                    this.classList.remove('error');
                    const errorMap = {
                        email: 'emailError',
                        username: 'usernameError',
                        password: 'passwordError',
                        confirmPassword: 'confirmPasswordError'
                    };
                    const errorEl = $('#' + errorMap[id]);
                    if (errorEl) errorEl.classList.remove('visible');
                });
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                if (isSubmitting) return;
                if (!validateForm()) return;

                const email = $('#email').value.trim().toLowerCase();
                const username = $('#username').value.trim();
                const nickname = $('#nickname').value.trim() || username;
                const reason = $('#reason').value.trim();
                const password = $('#password').value;

                // 不再使用 localStorage 查重，Supabase 会在注册时自动检查邮箱唯一性
                // 用户名查重可在触发器或 RLS 中处理，此处仅做基本前端校验

                isSubmitting = true;
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;

                // ============ Supabase 注册 ============
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username,
                            nickname,
                            reason
                        }
                    }
                });

                if (error) {
                    // 根据错误类型显示友好提示
                    if (error.message.includes('already registered') || error.message.includes('already exists')) {
                        showToast('该邮箱已被注册', 'error');
                        showFieldError('email', 'emailError', true);
                        $('#emailError').textContent = '该邮箱已被注册';
                    } else {
                        showToast(error.message, 'error');
                    }
                    isSubmitting = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }

                // 注册成功：触发器已自动在 profiles 表插入 status='pending' 的记录
                showToast('注册成功！请等待管理员审核', 'success');
                setTimeout(() => {
                    window.location.href = 'TDF-pending.html';
                }, 1200);
            });
        })();
        (function() {
            // ---------- 闪烁圆点 Canvas 实现 ----------
            const canvas = document.getElementById('dots-canvas');
            let ctx = canvas.getContext('2d');
            
            // 存储圆点数据：位置，半径，闪烁速度，相位偏移，可带微色彩（柔和金色/白）
            let dots = [];
            let animationFrameId = null;
            let winWidth = window.innerWidth;
            let winHeight = window.innerHeight;
            
            // 圆点数量：根据屏幕尺寸适当调整，保证性能且丰富（大屏多一些，小屏适中）
            const getDotsCount = () => {
                const area = winWidth * winHeight;
                if (area < 400000) return 10;      // 手机
                if (area < 1200000) return 20;     // 平板
                return 40;                         // 桌面大屏
            };
            
            // 随机范围函数
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }
            
            // 生成圆点阵列 (位置基于当前窗口尺寸)
            function generateDots() {
                const count = getDotsCount();
                const newDots = [];
                for (let i = 0; i < count; i++) {
                    // 圆点坐标均匀分布在画布范围内，且避免边缘过挤
                    const x = randomRange(20, winWidth - 20);
                    const y = randomRange(20, winHeight - 20);
                    // 半径 2~7px 之间微妙差异
                    const radius = randomRange(2.2, 6.5);
                    // 闪烁频率：0.5~2.2 rad/s 不同速度，产生错落闪烁
                    const speed = randomRange(0.6, 2.4);
                    // 相位偏移 0 到 2PI，起始不同
                    const phase = randomRange(0, Math.PI * 2);
                    // 轻微色彩倾向：主体为纯白/淡金色，极少数冷色点缀，完全符合浅色柔光
                    // 选温柔光谱
                    let colorStyle = {
                        r: 255,
                        g: 240 + Math.random() * 15,
                        b: 200 + Math.random() * 40,
                        alphaBase: 0.5
                    };
                    // 10%的概率让圆点带一点点清冷微蓝，丰富层次
                    if (Math.random() < 0.15) {
                        colorStyle = {
                            r: 210 + Math.random() * 45,
                            g: 225 + Math.random() * 30,
                            b: 250,
                            alphaBase: 0.55
                        };
                    }
                    newDots.push({
                        x, y, radius,
                        speed: speed,
                        phase: phase,
                        color: colorStyle,
                        // 微小振幅用来增加轻微半径波动（可不启用，但增加动态丰富度）
                        radiusAmp: randomRange(0, 0.6),
                        radiusSpeed: randomRange(0.8, 1.8)
                    });
                }
                return newDots;
            }
            
            // 重绘画布 (基于当前时间戳计算每个圆点的透明度Alpha及微半径变化)
            let lastTimestamp = 0;
            function drawDots(nowTime) {
                if (!ctx) return;
                // 清除画布（透明背景）
                ctx.clearRect(0, 0, winWidth, winHeight);
                
                // 获取全局时间秒数（用于正弦波闪烁）
                const seconds = (nowTime || performance.now()) / 1000;
                
                for (let i = 0; i < dots.length; i++) {
                    const d = dots[i];
                    // 动态透明度: alpha 在 0.25 ~ 0.85 之间优雅闪烁 sin 值域 [-1,1] -> 映射到 0.3~0.9
                    let sinVal = Math.sin(seconds * d.speed + d.phase);
                    let alpha = 0.35 + (sinVal + 1) / 2 * 0.55;   // 范围 0.35~0.9
                    // 增加轻微呼吸上限，避免过暗
                    alpha = Math.min(0.92, Math.max(0.28, alpha));
                    
                    // 半径微动态 (呼吸轻微缩放，增加灵动)
                    let dynamicRadius = d.radius;
                    if (d.radiusAmp > 0.01) {
                        const radiusSin = Math.sin(seconds * d.radiusSpeed + d.phase);
                        dynamicRadius = d.radius + radiusSin * d.radiusAmp;
                        dynamicRadius = Math.max(1.5, dynamicRadius);
                    }
                    
                    // 颜色设置 (带闪烁透明度)
                    const { r, g, b } = d.color;
                    ctx.beginPath();
                    // 轻微模糊光晕效果 (增加柔和感，但不影响性能过重)
                    ctx.shadowBlur = 0;  // 为了性能不启用阴影，但用径向渐变轻微光晕? 简单使用glow-like
                    ctx.arc(d.x, d.y, dynamicRadius, 0, Math.PI * 2);
                    // 填充圆点，颜色柔和带闪烁alpha
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                    ctx.fill();
                    
                    // 增加小部分圆点的高光内芯（可选, 让部分星星更生动)
                    if (alpha > 0.6 && dynamicRadius > 3) {
                        ctx.beginPath();
                        ctx.arc(d.x - 0.8, d.y - 0.8, dynamicRadius * 0.28, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 248, 225, ${alpha * 0.5})`;
                        ctx.fill();
                    }
                }
                // 可选: 极少数悬浮流光粒子感 (不做过多处理)
            }
            
            // 动画循环
            let renderLoop = (time) => {
                if (!canvas || !ctx) return;
                drawDots(time);
                animationFrameId = requestAnimationFrame(renderLoop);
            };
            
            // 窗口大小改变时 重新配置canvas尺寸 + 重新生成圆点位置 (适配新尺寸)
            function resizeCanvasAndDots() {
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                if (canvas) {
                    canvas.width = winWidth;
                    canvas.height = winHeight;
                    // 重置画布样式尺寸
                    canvas.style.width = `${winWidth}px`;
                    canvas.style.height = `${winHeight}px`;
                    // 根据新尺寸重新生成点位置
                    dots = generateDots();
                    // 瞬间刷新一帧，避免旧坐标遗留
                    if (ctx) {
                        ctx.clearRect(0, 0, winWidth, winHeight);
                        drawDots(performance.now());
                    }
                }
            }
            
            // 节流防抖，确保resize时性能良好
            let resizeTimer;
            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    resizeCanvasAndDots();
                }, 120);
            }
            
            // 初始化Canvas及一切
            function initCanvasAndDots() {
                if (!canvas) return;
                ctx = canvas.getContext('2d');
                if (!ctx) return;
                // 设置实际像素尺寸
                winWidth = window.innerWidth;
                winHeight = window.innerHeight;
                canvas.width = winWidth;
                canvas.height = winHeight;
                canvas.style.width = `${winWidth}px`;
                canvas.style.height = `${winHeight}px`;
                
                // 生成圆点数据
                dots = generateDots();
                
                // 开始动画
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(renderLoop);
                
                // 监听resize
                window.addEventListener('resize', handleResize);
            }
            
            // 使用页面可见性API, 页面隐藏时停止动画优化性能 (可选)
            function handleVisibilityChange() {
                if (document.hidden) {
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                } else {
                    if (!animationFrameId && ctx) {
                        // 重启动画前重绘一帧
                        drawDots(performance.now());
                        animationFrameId = requestAnimationFrame(renderLoop);
                    }
                }
            }
            
            // 启动所有特效
            function start() {
                initCanvasAndDots();
                document.addEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 优雅销毁 (防止内存)
            function cleanUp() {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                window.removeEventListener('resize', handleResize);
                document.removeEventListener('visibilitychange', handleVisibilityChange);
            }
            
            // 开始
            start();
            // 页面unload时清理（非必须但干净）
            window.addEventListener('beforeunload', () => {
                cleanUp();
            });
        })();
        
    </script>
        <!-- ====== 鼠标点击粒子效果 ====== -->
        <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></canvas>
        <script>
            (function() {
                const canvas = document.getElementById('particleCanvas');
                const ctx = canvas.getContext('2d');
                let width, height;
    
                function resize() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();
    
                // 粒子数组
                let particles = [];
    
                // 粒子类
                class Particle {
                    constructor(x, y) {
                        this.x = x;
                        this.y = y;
                        // 随机速度方向
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 4 + 2; // 2~6 px/帧
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed - 0.5; // 轻微向上偏移，更有烟花感
                        // 大小随机
                        this.radius = Math.random() * 4 + 2;
                        // 颜色 (HSL 彩虹)
                        this.hue = Math.random() * 360;
                        this.saturation = 100;
                        this.lightness = 60;
                        // 透明度
                        this.alpha = 1;
                        // 重力（让粒子缓缓下落）
                        this.gravity = 0.08;
                        // 寿命（帧数）
                        this.life = 1;
                        this.decay = 0.008 + Math.random() * 0.01; // 每帧衰减
                    }
    
                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vy += this.gravity; // 重力
                        // 速度逐渐减小（空气阻力）
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                        // 透明度衰减
                        this.alpha -= this.decay;
                        // 半径缓慢缩小
                        this.radius *= 0.995;
                        this.life -= 0.01;
                    }
    
                    draw() {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, this.alpha);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
                        ctx.fillStyle = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
                        ctx.fill();
                        // 加一点辉光
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                        ctx.fill();
                        ctx.restore();
                    }
    
                    isDead() {
                        return this.alpha <= 0 || this.radius < 0.3 || this.life <= 0;
                    }
                }
    
                // 生成粒子
                function createParticles(x, y, count = 35) {
                    for (let i = 0; i < count; i++) {
                        particles.push(new Particle(x, y));
                    }
                }
    
                // 动画循环
                function animate() {
                    // 清空画布（透明，让粒子叠加）
                    ctx.clearRect(0, 0, width, height);
                    // 更新并绘制每个粒子
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.update();
                        p.draw();
                        if (p.isDead()) {
                            particles.splice(i, 1);
                        }
                    }
                    requestAnimationFrame(animate);
                }
    
                // 监听点击事件
                document.addEventListener('click', function(e) {
                    // 获取点击位置（相对于视口）
                    const x = e.clientX;
                    const y = e.clientY;
                    // 生成粒子，数量可在 25~50 之间调整
                    createParticles(x, y, 30 + Math.floor(Math.random() * 20));
                });
    
                // 启动动画
                animate();
    
                // 可选：页面关闭时清理
                window.addEventListener('beforeunload', function() {
                    particles = [];
                });
            })();
    </script>
